<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Guardar Película</title>
</head>
<body>
    <h2 th:text="${pelicula.idpelicula != null} ? 'Editar Película' : 'Nueva Película'"></h2>
    
    <form th:action="@{/peliculas/guardar}" th:object="${pelicula}" method="post">
        <input type="hidden" th:field="*{idpelicula}" />
        
        <div>
            <label>Nombre:</label>
            <input type="text" th:field="*{nombre}" required />
        </div>
        <div>
            <label>Director:</label>
            <input type="text" th:field="*{director}" required />
        </div>
        <div>
            <label>Fecha de Estreno:</label>
            <input type="date" th:field="*{fechaEstreno}" required />
        </div>
        <div>
            <label>Género:</label>
            <select th:field="*{genero.idgenero}" required>
                <option value="">Seleccione un género...</option>
                <option th:each="g : ${generos}" th:value="${g.idgenero}" th:text="${g.nombre}"></option>
            </select>
        </div>
        <br>
        <button type="submit">Guardar Película</button>
        <a th:href="@{/peliculas}">Cancelar</a>
    </form>
</body>
</html>
